name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-modeling.txt
            constraints/ci.txt
      - name: Record runner environment
        shell: bash
        run: |
          {
            echo "### Runner environment"
            echo "- OS: $RUNNER_OS"
            echo "- Architecture: $RUNNER_ARCH"
            echo "- Image OS: ${ImageOS:-unknown}"
            echo "- Image version: ${ImageVersion:-unknown}"
            echo "- Python: $(python --version 2>&1)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Install qualification environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -c constraints/ci.txt -r requirements-modeling.txt . pytest pytest-cov ruff mypy build setuptools wheel
      - name: Canonical local-parity qualification
        run: >-
          python scripts/qualify_local.py
          --profile core
          --skip-build
          --full-suite-repeats 1
          --smoke-repeats 1
          --log-dir qualification_logs

  build:
    name: build-and-verify-distributions
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.1.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-modeling.txt
            constraints/ci.txt
      - name: Build distributions without network isolation
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -c constraints/ci.txt build setuptools wheel
          python -m build --no-isolation
      - name: Verify distribution contents
        run: python scripts/verify_distribution.py dist/*.whl dist/*.tar.gz
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: payment-ops-hardening-overlay-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
      - name: Attest tagged distributions
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
